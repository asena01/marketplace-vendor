<div class="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100">
  <app-header></app-header>

  <div class="flex items-center justify-center min-h-[calc(100vh-80px)] px-4">
    <div class="text-center">
      <div class="text-8xl mb-6 animate-bounce">{{ icon }}</div>
      <h1 class="text-5xl font-bold text-slate-900 mb-4">{{ title }}</h1>
      <p class="text-xl text-slate-600 mb-8 max-w-2xl mx-auto">
        {{ description }}
      </p>
      <p class="text-slate-500 text-lg mb-8">
        Continue prompting to help us build this page!
      </p>
      <a href="/" class="inline-block px-8 py-4 bg-gradient-to-r from-primary to-secondary text-white rounded-lg hover:shadow-lg transition font-semibold">
        Back to Home
      </a>
    </div>
  </div>
</div>
